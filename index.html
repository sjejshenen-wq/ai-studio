<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced AI Image Studio</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0b0b14 0%, #1a1a2e 100%);
    color: white;
    display: flex;
    height: 100vh;
}

.left {
    width: 400px;
    background: rgba(17, 17, 34, 0.95);
    padding: 20px;
    overflow-y: auto;
    border-right: 1px solid rgba(108, 92, 231, 0.3);
    box-shadow: -2px 0 10px rgba(0,0,0,0.5);
}

.left h2 {
    margin-top: 0;
    color: #6c5ce7;
    border-bottom: 2px solid #6c5ce7;
    padding-bottom: 10px;
}

.badge {
    background: rgba(255, 193, 7, 0.2);
    border: 1px solid #ffc107;
    color: #ffc107;
    padding: 8px;
    border-radius: 6px;
    font-size: 11px;
    margin-top: 10px;
    line-height: 1.4;
}

label {
    display: block;
    margin-top: 15px;
    font-size: 12px;
    text-transform: uppercase;
    color: #aaa;
    font-weight: bold;
    letter-spacing: 0.5px;
}

textarea, select, input[type="text"] {
    width: 100%;
    margin-top: 8px;
    background: rgba(28, 28, 43, 0.8);
    border: 1px solid rgba(108, 92, 231, 0.5);
    color: white;
    padding: 12px;
    font-family: Arial;
    font-size: 13px;
    border-radius: 6px;
    transition: all 0.3s;
    resize: vertical;
}

textarea:focus, select:focus, input:focus {
    outline: none;
    border-color: #6c5ce7;
    background: rgba(28, 28, 43, 1);
    box-shadow: 0 0 10px rgba(108, 92, 231, 0.3);
}

button {
    width: 100%;
    padding: 13px;
    margin-top: 10px;
    background: linear-gradient(135deg, #6c5ce7 0%, #7d70f0 100%);
    border: none;
    color: white;
    cursor: pointer;
    font-weight: bold;
    border-radius: 6px;
    transition: all 0.3s;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

button:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 5px 20px rgba(108, 92, 231, 0.4);
}

button:disabled {
    background: #444;
    cursor: not-allowed;
    opacity: 0.6;
}

.button-group {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.button-group button {
    flex: 1;
    margin-top: 0;
}

.right {
    flex: 1;
    padding: 30px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
}

.result-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 20px;
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    min-height: 300px;
    position: relative;
}

#result {
    max-width: 95%;
    max-height: 95%;
    border-radius: 10px;
    box-shadow: 0 10px 40px rgba(108, 92, 231, 0.3);
}

.gallery {
    max-height: 150px;
    overflow-x: auto;
    padding: 10px;
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
    display: flex;
    gap: 10px;
}

.gallery img {
    width: 120px;
    height: 120px;
    object-fit: cover;
    cursor: pointer;
    border-radius: 6px;
    border: 2px solid transparent;
    transition: all 0.2s;
    flex-shrink: 0;
}

.gallery img:hover {
    border-color: #6c5ce7;
    transform: scale(1.05);
}

#status {
    padding: 12px;
    border-radius: 6px;
    margin-top: 15px;
    font-size: 12px;
    line-height: 1.5;
    display: none;
}

#status.show {
    display: block;
}

#status.info {
    background: rgba(108, 92, 231, 0.2);
    border: 1px solid #6c5ce7;
    color: #87ceeb;
}

#status.success {
    background: rgba(81, 207, 102, 0.2);
    border: 1px solid #51cf66;
    color: #51cf66;
}

#status.error {
    background: rgba(255, 107, 107, 0.2);
    border: 1px solid #ff6b6b;
    color: #ff6b6b;
}

.loader {
    border: 3px solid rgba(108, 92, 231, 0.2);
    border-radius: 50%;
    border-top: 3px solid #6c5ce7;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
    margin: 0 auto;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

h3 {
    margin-top: 0;
    color: #fff;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="left">

<h2>🎨 Premium AI Studio</h2>

<div class="badge">
    ⭐ Powered by GPT-4 Vision • Ultra High Quality • No API Key
</div>

<label for="prompt">📝 Detailed Prompt</label>
<textarea id="prompt" rows="4">A stunning futuristic cyberpunk city at night with neon lights, bioluminescent plants, detailed architecture, cinematic lighting</textarea>

<label for="model">🤖 AI Model</label>
<select id="model">
    <option value="gpt-image-2">✨ GPT-Image-2 (Best Quality - Recommended)</option>
    <option value="gpt-image-1.5">⭐ GPT-Image-1.5 (Very Good)</option>
    <option value="dall-e-3">🎨 DALL-E 3 (Alternative)</option>
</select>

<label for="style">🎨 Art Style</label>
<select id="style">
    <option value="photorealistic">Photorealistic 8K Cinematic</option>
    <option value="concept-art">Concept Art Studio Quality</option>
    <option value="oil-painting">Oil Painting Renaissance</option>
    <option value="anime">Anime High Quality</option>
    <option value="3d-render">3D Render Octane</option>
    <option value="watercolor">Watercolor Artistic</option>
</select>

<label for="negative">❌ What to Avoid</label>
<textarea id="negative" rows="2">blurry, low quality, distorted, bad anatomy, ugly, watermark, text</textarea>

<div class="button-group">
    <button id="generateBtn" onclick="generateImage()">✨ GENERATE</button>
    <button id="downloadBtn" onclick="downloadImage()" style="display:none;">⬇️ DOWNLOAD</button>
</div>
<button id="clearBtn" onclick="clearHistory()">🗑️ CLEAR</button>

<div id="status"></div>

</div>

<div class="right">

<h3>Preview</h3>
<div class="result-container">
    <div id="result" style="display:none;"></div>
    <div class="loader" id="loader" style="display:none;"></div>
</div>

<h3>History</h3>
<div class="gallery" id="gallery"></div>

</div>

<script src="https://js.puter.com/v2/"></script>

<script>

let currentImageUrl = null;
let isGenerating = false;

const styleMap = {
    'photorealistic': 'photorealistic 8k professional cinematic lighting',
    'concept-art': 'concept art digital painting trending artstation',
    'oil-painting': 'oil painting renaissance style masterpiece',
    'anime': 'anime style high quality detailed vibrant',
    '3d-render': '3d render octane ray tracing volumetric',
    'watercolor': 'watercolor painting ink wash artistic'
};

function showStatus(message, type = 'info') {
    const status = document.getElementById('status');
    status.textContent = message;
    status.className = `show ${type}`;
}

function buildPrompt(basePrompt, style, negative) {
    let styleDetails = styleMap[style] || '';
    let prompt = basePrompt;
    
    if (styleDetails && !prompt.toLowerCase().includes(styleDetails.split(' ')[0])) {
        prompt += ', ' + styleDetails;
    }
    
    return prompt;
}

async function generateImage() {
    if (isGenerating) return;

    const prompt = document.getElementById('prompt').value.trim();
    
    if (!prompt) {
        showStatus('❌ Please enter a prompt!', 'error');
        return;
    }

    isGenerating = true;
    
    try {
        document.getElementById('generateBtn').disabled = true;
        document.getElementById('loader').style.display = 'block';
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'none';
        resultDiv.innerHTML = '';
        document.getElementById('downloadBtn').style.display = 'none';

        const model = document.getElementById('model').value;
        const style = document.getElementById('style').value;
        const negative = document.getElementById('negative').value;

        const fullPrompt = buildPrompt(prompt, style, negative);
        
        showStatus(`⏳ Generating with ${model}... (may take 60-90 seconds for best quality)`, 'info');

        // Use Puter.js AI API with GPT models
        const imageElement = await puter.ai.txt2img(fullPrompt, {
            model: model,
            negative_prompt: negative
        });

        if (!imageElement || !imageElement.src) {
            throw new Error('Failed to generate image - invalid response');
        }

        currentImageUrl = imageElement.src;
        
        // Copy the image element
        const resultDiv2 = document.getElementById('result');
        resultDiv2.innerHTML = '';
        resultDiv2.appendChild(imageElement.cloneNode(true));
        resultDiv2.style.display = 'block';
        document.getElementById('downloadBtn').style.display = 'block';
        
        addToHistory(imageElement.src);
        showStatus('✅ Ultra high-quality image generated!', 'success');

    } catch (error) {
        console.error('Generation error:', error);
        showStatus(`❌ ${error.message || 'Generation failed. Try again!'}`, 'error');
    } finally {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('generateBtn').disabled = false;
        isGenerating = false;
    }
}

function addToHistory(url) {
    const img = document.createElement('img');
    img.src = url;
    img.onclick = () => {
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = '';
        const newImg = document.createElement('img');
        newImg.src = url;
        newImg.style.maxWidth = '95%';
        newImg.style.maxHeight = '95%';
        newImg.style.borderRadius = '10px';
        newImg.style.boxShadow = '0 10px 40px rgba(108, 92, 231, 0.3)';
        resultDiv.appendChild(newImg);
        resultDiv.style.display = 'block';
        currentImageUrl = url;
        document.getElementById('downloadBtn').style.display = 'block';
    };
    
    const gallery = document.getElementById('gallery');
    gallery.insertBefore(img, gallery.firstChild);
    
    while (gallery.children.length > 10) {
        gallery.removeChild(gallery.lastChild);
    }
}

function downloadImage() {
    if (!currentImageUrl) {
        showStatus('❌ No image to download', 'error');
        return;
    }
    
    const a = document.createElement('a');
    a.href = currentImageUrl;
    a.download = `ai-image-${Date.now()}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

function clearHistory() {
    document.getElementById('gallery').innerHTML = '';
    document.getElementById('result').innerHTML = '';
    document.getElementById('result').style.display = 'none';
    document.getElementById('downloadBtn').style.display = 'none';
    document.getElementById('loader').style.display = 'none';
    currentImageUrl = null;
}

window.addEventListener('load', () => {
    showStatus('✓ Ready! Using GPT-4 Image Generation. Click GENERATE!', 'info');
});

</script>

</body>
</html>
