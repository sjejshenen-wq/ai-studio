<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced AI Image Studio</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0b0b14 0%, #1a1a2e 100%);
    color: white;
    display: flex;
    height: 100vh;
}

.left {
    width: 380px;
    background: rgba(17, 17, 34, 0.95);
    padding: 20px;
    overflow-y: auto;
    border-right: 1px solid rgba(108, 92, 231, 0.3);
    box-shadow: -2px 0 10px rgba(0,0,0,0.5);
}

.left h2 {
    margin-top: 0;
    color: #6c5ce7;
    border-bottom: 2px solid #6c5ce7;
    padding-bottom: 10px;
}

label {
    display: block;
    margin-top: 15px;
    font-size: 12px;
    text-transform: uppercase;
    color: #aaa;
    font-weight: bold;
    letter-spacing: 0.5px;
}

textarea, select, input[type="text"] {
    width: 100%;
    margin-top: 8px;
    background: rgba(28, 28, 43, 0.8);
    border: 1px solid rgba(108, 92, 231, 0.5);
    color: white;
    padding: 12px;
    font-family: Arial;
    font-size: 13px;
    border-radius: 6px;
    transition: all 0.3s;
}

textarea:focus, select:focus, input:focus {
    outline: none;
    border-color: #6c5ce7;
    background: rgba(28, 28, 43, 1);
    box-shadow: 0 0 10px rgba(108, 92, 231, 0.3);
}

button {
    width: 100%;
    padding: 13px;
    margin-top: 10px;
    background: linear-gradient(135deg, #6c5ce7 0%, #7d70f0 100%);
    border: none;
    color: white;
    cursor: pointer;
    font-weight: bold;
    border-radius: 6px;
    transition: all 0.3s;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

button:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 5px 20px rgba(108, 92, 231, 0.4);
}

button:disabled {
    background: #444;
    cursor: not-allowed;
    opacity: 0.6;
}

.button-group {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.button-group button {
    flex: 1;
    margin-top: 0;
}

.right {
    flex: 1;
    padding: 30px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
}

.result-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 20px;
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    min-height: 300px;
    position: relative;
}

#result {
    max-width: 95%;
    max-height: 95%;
    border-radius: 10px;
    box-shadow: 0 10px 40px rgba(108, 92, 231, 0.3);
}

.gallery {
    max-height: 150px;
    overflow-x: auto;
    padding: 10px;
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
    display: flex;
    gap: 10px;
}

.gallery img {
    width: 120px;
    height: 120px;
    object-fit: cover;
    cursor: pointer;
    border-radius: 6px;
    border: 2px solid transparent;
    transition: all 0.2s;
    flex-shrink: 0;
}

.gallery img:hover {
    border-color: #6c5ce7;
    transform: scale(1.05);
}

#status {
    padding: 12px;
    border-radius: 6px;
    margin-top: 15px;
    font-size: 12px;
    line-height: 1.5;
    display: none;
}

#status.show {
    display: block;
}

#status.info {
    background: rgba(108, 92, 231, 0.2);
    border: 1px solid #6c5ce7;
    color: #87ceeb;
}

#status.success {
    background: rgba(81, 207, 102, 0.2);
    border: 1px solid #51cf66;
    color: #51cf66;
}

#status.error {
    background: rgba(255, 107, 107, 0.2);
    border: 1px solid #ff6b6b;
    color: #ff6b6b;
}

.loader {
    border: 3px solid rgba(108, 92, 231, 0.2);
    border-radius: 50%;
    border-top: 3px solid #6c5ce7;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
    margin: 0 auto;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

h3 {
    margin-top: 0;
    color: #fff;
    font-size: 14px;
}

.info-badge {
    background: rgba(76, 175, 80, 0.15);
    border: 1px solid rgba(76, 175, 80, 0.5);
    border-radius: 6px;
    padding: 8px;
    font-size: 11px;
    color: #4caf50;
    margin-top: 10px;
    line-height: 1.4;
}
</style>
</head>

<body>

<div class="left">

<h2>🎨 AI Image Studio</h2>

<div class="info-badge">
    ✓ Free AI Image Generation • No Sign-Up Required
</div>

<label for="prompt">Prompt (Be Descriptive!)</label>
<textarea id="prompt" rows="3">a serene futuristic city with bioluminescent plants, cyberpunk aesthetic, neon lights, cinematic lighting, highly detailed, 8k</textarea>

<label for="style">Art Style</label>
<select id="style">
    <option value="">None</option>
    <option value=" ultra realistic, cinematic lighting, award-winning photography">Photorealistic</option>
    <option value=" anime style, vibrant colors, manga art">Anime</option>
    <option value=" 3d render, octane render, ray tracing">3D Render</option>
    <option value=" oil painting, renaissance, baroque">Classical Art</option>
    <option value=" pixel art, 8-bit, retro gaming">Pixel Art</option>
    <option value=" concept art, digital painting">Concept Art</option>
</select>

<label for="negative">What to Avoid</label>
<textarea id="negative" rows="2">blurry, low quality, distorted, bad anatomy, watermark, text</textarea>

<label for="size">Image Size</label>
<select id="size">
    <option value="512">512x512 (Fast)</option>
    <option value="640">640x640</option>
    <option value="768">768x768 (Best)</option>
</select>

<div class="button-group">
    <button id="generateBtn" onclick="generateImage()">🎨 GENERATE</button>
    <button id="downloadBtn" onclick="downloadImage()" style="display:none;">⬇️ DOWNLOAD</button>
</div>
<button id="clearBtn" onclick="clearHistory()">🗑️ CLEAR</button>

<div id="status"></div>

</div>

<div class="right">

<h3>Preview</h3>
<div class="result-container">
    <img id="result" style="display:none;"/>
    <div class="loader" id="loader" style="display:none;"></div>
</div>

<h3>History</h3>
<div class="gallery" id="gallery"></div>

</div>

<script>

let currentImageUrl = null;
let isGenerating = false;

function showStatus(message, type = 'info') {
    const status = document.getElementById('status');
    status.textContent = message;
    status.className = `show ${type}`;
}

function hideStatus() {
    document.getElementById('status').className = '';
}

async function generateImage() {
    if (isGenerating) return;

    try {
        isGenerating = true;
        document.getElementById('generateBtn').disabled = true;
        document.getElementById('loader').style.display = 'block';
        document.getElementById('result').style.display = 'none';
        document.getElementById('downloadBtn').style.display = 'none';

        const prompt = document.getElementById('prompt').value.trim();
        const style = document.getElementById('style').value;
        const negative = document.getElementById('negative').value;
        const size = document.getElementById('size').value;

        if (!prompt) {
            showStatus('❌ Please enter a prompt!', 'error');
            document.getElementById('generateBtn').disabled = false;
            return;
        }

        let fullPrompt = prompt + style;
        
        showStatus(`⏳ Generating image...`, 'info');

        // Using Pollinations.ai API - more reliable
        const encodedPrompt = encodeURIComponent(fullPrompt);
        const url = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=${size}&height=${size}&seed=${Math.floor(Math.random() * 999999)}`;

        // Test if image loads
        const img = new Image();
        
        img.onload = () => {
            currentImageUrl = url;
            document.getElementById('result').src = url;
            document.getElementById('result').style.display = 'block';
            document.getElementById('downloadBtn').style.display = 'block';
            
            addToHistory(url);
            showStatus('✅ Image generated successfully!', 'success');
            document.getElementById('generateBtn').disabled = false;
        };

        img.onerror = () => {
            showStatus('❌ Failed to generate. Try a different prompt!', 'error');
            document.getElementById('generateBtn').disabled = false;
        };

        // Start loading
        img.src = url;

    } catch (error) {
        console.error('Error:', error);
        showStatus(`❌ ${error.message}`, 'error');
        document.getElementById('generateBtn').disabled = false;
    } finally {
        document.getElementById('loader').style.display = 'none';
        isGenerating = false;
    }
}

function addToHistory(url) {
    const img = document.createElement('img');
    img.src = url;
    img.onclick = () => {
        document.getElementById('result').src = url;
        document.getElementById('result').style.display = 'block';
        currentImageUrl = url;
        document.getElementById('downloadBtn').style.display = 'block';
    };
    
    document.getElementById('gallery').insertBefore(img, document.getElementById('gallery').firstChild);
}

function downloadImage() {
    if (!currentImageUrl) return;
    
    const a = document.createElement('a');
    a.href = currentImageUrl;
    a.download = `ai-image-${Date.now()}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

function clearHistory() {
    document.getElementById('gallery').innerHTML = '';
    document.getElementById('result').style.display = 'none';
    document.getElementById('downloadBtn').style.display = 'none';
    hideStatus();
}

window.addEventListener('load', () => {
    showStatus('✓ Ready! Enter your prompt and click GENERATE', 'info');
});

</script>

</body>
</html>
