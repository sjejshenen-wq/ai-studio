<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced AI Image Studio</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0b0b14 0%, #1a1a2e 100%);
    color: white;
    display: flex;
    height: 100vh;
}

.left {
    width: 400px;
    background: rgba(17, 17, 34, 0.95);
    padding: 20px;
    overflow-y: auto;
    border-right: 1px solid rgba(108, 92, 231, 0.3);
    box-shadow: -2px 0 10px rgba(0,0,0,0.5);
}

.left h2 {
    margin-top: 0;
    color: #6c5ce7;
    border-bottom: 2px solid #6c5ce7;
    padding-bottom: 10px;
}

label {
    display: block;
    margin-top: 15px;
    font-size: 12px;
    text-transform: uppercase;
    color: #aaa;
    font-weight: bold;
    letter-spacing: 0.5px;
}

textarea, select, input[type="text"] {
    width: 100%;
    margin-top: 8px;
    background: rgba(28, 28, 43, 0.8);
    border: 1px solid rgba(108, 92, 231, 0.5);
    color: white;
    padding: 12px;
    font-family: Arial;
    font-size: 13px;
    border-radius: 6px;
    transition: all 0.3s;
    resize: vertical;
}

textarea:focus, select:focus, input:focus {
    outline: none;
    border-color: #6c5ce7;
    background: rgba(28, 28, 43, 1);
    box-shadow: 0 0 10px rgba(108, 92, 231, 0.3);
}

button {
    width: 100%;
    padding: 13px;
    margin-top: 10px;
    background: linear-gradient(135deg, #6c5ce7 0%, #7d70f0 100%);
    border: none;
    color: white;
    cursor: pointer;
    font-weight: bold;
    border-radius: 6px;
    transition: all 0.3s;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

button:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 5px 20px rgba(108, 92, 231, 0.4);
}

button:disabled {
    background: #444;
    cursor: not-allowed;
    opacity: 0.6;
}

.button-group {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.button-group button {
    flex: 1;
    margin-top: 0;
}

.right {
    flex: 1;
    padding: 30px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
}

.result-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 20px;
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    min-height: 300px;
    position: relative;
}

#result {
    max-width: 95%;
    max-height: 95%;
    border-radius: 10px;
    box-shadow: 0 10px 40px rgba(108, 92, 231, 0.3);
}

.gallery {
    max-height: 150px;
    overflow-x: auto;
    padding: 10px;
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
    display: flex;
    gap: 10px;
}

.gallery img {
    width: 120px;
    height: 120px;
    object-fit: cover;
    cursor: pointer;
    border-radius: 6px;
    border: 2px solid transparent;
    transition: all 0.2s;
    flex-shrink: 0;
}

.gallery img:hover {
    border-color: #6c5ce7;
    transform: scale(1.05);
}

#status {
    padding: 12px;
    border-radius: 6px;
    margin-top: 15px;
    font-size: 12px;
    line-height: 1.5;
    display: none;
}

#status.show {
    display: block;
}

#status.info {
    background: rgba(108, 92, 231, 0.2);
    border: 1px solid #6c5ce7;
    color: #87ceeb;
}

#status.success {
    background: rgba(81, 207, 102, 0.2);
    border: 1px solid #51cf66;
    color: #51cf66;
}

#status.error {
    background: rgba(255, 107, 107, 0.2);
    border: 1px solid #ff6b6b;
    color: #ff6b6b;
}

.loader {
    border: 3px solid rgba(108, 92, 231, 0.2);
    border-radius: 50%;
    border-top: 3px solid #6c5ce7;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
    margin: 0 auto;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

h3 {
    margin-top: 0;
    color: #fff;
    font-size: 14px;
}

.info-badge {
    background: rgba(76, 175, 80, 0.15);
    border: 1px solid rgba(76, 175, 80, 0.5);
    border-radius: 6px;
    padding: 8px;
    font-size: 11px;
    color: #4caf50;
    margin-top: 10px;
    line-height: 1.4;
}

.quality-note {
    background: rgba(33, 150, 243, 0.15);
    border: 1px solid rgba(33, 150, 243, 0.5);
    border-radius: 6px;
    padding: 8px;
    font-size: 11px;
    color: #2196f3;
    margin-top: 10px;
    line-height: 1.4;
}
</style>
</head>

<body>

<div class="left">

<h2>🎨 Premium AI Studio</h2>

<div class="info-badge">
    ✓ High-Quality Generation • No Sign-Up
</div>

<label for="prompt">📝 Detailed Prompt</label>
<textarea id="prompt" rows="4">A stunning futuristic cyberpunk city at night with neon lights, bioluminescent plants, detailed architecture</textarea>

<div class="quality-note">
💡 Tip: More specific details = Better results. Include lighting, mood, and artistic style.
</div>

<label for="style">🎨 Art Style</label>
<select id="style">
    <option value="photorealistic">Photorealistic (Most Realistic)</option>
    <option value="concept-art">Concept Art (Artistic)</option>
    <option value="oil-painting">Oil Painting (Classical)</option>
    <option value="anime">Anime (Stylized)</option>
    <option value="3d-render">3D Render (CGI)</option>
    <option value="watercolor">Watercolor (Artistic)</option>
    <option value="digital-art">Digital Art (Modern)</option>
</select>

<label for="quality">⭐ Quality Level</label>
<select id="quality">
    <option value="ultra">Ultra High (Slower, Best)</option>
    <option value="high">High Quality</option>
    <option value="standard">Standard (Fast)</option>
</select>

<label for="negative">❌ What to Avoid</label>
<textarea id="negative" rows="2">blurry, low quality, distorted, bad anatomy, ugly, watermark</textarea>

<label for="size">📐 Resolution</label>
<select id="size">
    <option value="512">512x512 (Fast)</option>
    <option value="640">640x640</option>
    <option value="768">768x768 (Best Quality)</option>
</select>

<div class="button-group">
    <button id="generateBtn" onclick="generateImage()">✨ GENERATE</button>
    <button id="downloadBtn" onclick="downloadImage()" style="display:none;">⬇️ DOWNLOAD</button>
</div>
<button id="clearBtn" onclick="clearHistory()">🗑️ CLEAR</button>

<div id="status"></div>

</div>

<div class="right">

<h3>Preview</h3>
<div class="result-container">
    <img id="result" style="display:none;"/>
    <div class="loader" id="loader" style="display:none;"></div>
</div>

<h3>History</h3>
<div class="gallery" id="gallery"></div>

</div>

<script>

let currentImageUrl = null;
let isGenerating = false;

// Map style names to quality keywords
const styleMap = {
    'photorealistic': 'ultra realistic photorealistic professional photography cinematic lighting',
    'concept-art': 'concept art digital painting trending professional detailed',
    'oil-painting': 'oil painting renaissance style masterpiece',
    'anime': 'anime style vibrant colors detailed manga art',
    '3d-render': '3d render octane render ray tracing photorealistic',
    'watercolor': 'watercolor painting ink wash artistic elegant',
    'digital-art': 'digital art illustration professional'
};

// Quality level keywords
const qualityKeywords = {
    'ultra': 'ultra detailed masterpiece 8k award-winning',
    'high': 'high quality 4k detailed professional',
    'standard': 'good quality detailed'
};

function showStatus(message, type = 'info') {
    const status = document.getElementById('status');
    status.textContent = message;
    status.className = `show ${type}`;
}

function hideStatus() {
    document.getElementById('status').className = '';
}

function buildEnhancedPrompt(basePrompt, style, quality) {
    const styleDetails = styleMap[style] || '';
    const qualityDetails = qualityKeywords[quality] || qualityKeywords['high'];
    
    let fullPrompt = basePrompt;
    
    // Add style if not already in prompt
    if (styleDetails && !fullPrompt.toLowerCase().includes(styleDetails.split(' ')[0])) {
        fullPrompt += ' ' + styleDetails;
    }
    
    // Add quality modifiers
    fullPrompt += ' ' + qualityDetails;
    
    // Add universal boosters (without too many)
    fullPrompt += ' sharp focus well composed';
    
    return fullPrompt.trim();
}

async function generateImage() {
    if (isGenerating) {
        showStatus('⏳ Already generating... please wait', 'info');
        return;
    }

    const prompt = document.getElementById('prompt').value.trim();
    
    if (!prompt) {
        showStatus('❌ Please enter a prompt!', 'error');
        return;
    }

    isGenerating = true;
    
    try {
        document.getElementById('generateBtn').disabled = true;
        document.getElementById('loader').style.display = 'block';
        document.getElementById('result').style.display = 'none';
        document.getElementById('downloadBtn').style.display = 'none';

        const style = document.getElementById('style').value;
        const quality = document.getElementById('quality').value;
        const size = document.getElementById('size').value;

        // Build enhanced prompt
        const enhancedPrompt = buildEnhancedPrompt(prompt, style, quality);
        
        showStatus(`⏳ Generating ${size}x${size} image...`, 'info');

        // Using Pollinations.ai API
        const encodedPrompt = encodeURIComponent(enhancedPrompt);
        const seed = Math.floor(Math.random() * 999999);
        const url = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=${size}&height=${size}&seed=${seed}`;

        // Test if image loads
        const img = new Image();
        let loadTimeout;
        
        img.onload = () => {
            clearTimeout(loadTimeout);
            currentImageUrl = url;
            document.getElementById('result').src = url;
            document.getElementById('result').style.display = 'block';
            document.getElementById('downloadBtn').style.display = 'block';
            document.getElementById('loader').style.display = 'none';
            
            addToHistory(url);
            showStatus('✅ Image generated successfully!', 'success');
            document.getElementById('generateBtn').disabled = false;
            isGenerating = false;
        };

        img.onerror = () => {
            clearTimeout(loadTimeout);
            document.getElementById('loader').style.display = 'none';
            showStatus('❌ Generation failed. Try a simpler prompt or try again.', 'error');
            document.getElementById('generateBtn').disabled = false;
            isGenerating = false;
        };

        // Timeout after 120 seconds
        loadTimeout = setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            showStatus('⏱️ Generation took too long. Try a simpler prompt.', 'error');
            document.getElementById('generateBtn').disabled = false;
            isGenerating = false;
        }, 120000);

        img.src = url;

    } catch (error) {
        console.error('Error:', error);
        document.getElementById('loader').style.display = 'none';
        showStatus(`❌ Error: ${error.message}`, 'error');
        document.getElementById('generateBtn').disabled = false;
        isGenerating = false;
    }
}

function addToHistory(url) {
    const img = document.createElement('img');
    img.src = url;
    img.onclick = () => {
        document.getElementById('result').src = url;
        document.getElementById('result').style.display = 'block';
        currentImageUrl = url;
        document.getElementById('downloadBtn').style.display = 'block';
    };
    
    const gallery = document.getElementById('gallery');
    gallery.insertBefore(img, gallery.firstChild);
    
    // Keep only last 10 images
    while (gallery.children.length > 10) {
        gallery.removeChild(gallery.lastChild);
    }
}

function downloadImage() {
    if (!currentImageUrl) {
        showStatus('❌ No image to download', 'error');
        return;
    }
    
    const a = document.createElement('a');
    a.href = currentImageUrl;
    a.download = `ai-image-${Date.now()}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

function clearHistory() {
    document.getElementById('gallery').innerHTML = '';
    document.getElementById('result').style.display = 'none';
    document.getElementById('downloadBtn').style.display = 'none';
    document.getElementById('loader').style.display = 'none';
    currentImageUrl = null;
    hideStatus();
}

window.addEventListener('load', () => {
    showStatus('✓ Ready! Enter your prompt and click GENERATE', 'info');
});

</script>

</body>
</html>
